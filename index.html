<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA SUPREME - Global AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; background: #000; border-bottom: 2px solid var(--neon); text-align: center; box-shadow: 0 0 20px var(--neon); }
        h1 { margin: 0; font-size: 22px; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; background: radial-gradient(circle at top, #111 0%, #050505 100%); }
        .msg { padding: 15px 20px; border-radius: 15px; max-width: 85%; font-size: 16px; line-height: 1.6; border: 1px solid rgba(255,255,255,0.1); animation: fadeIn 0.3s ease; }
        .alpha { align-self: flex-start; background: rgba(255,255,255,0.05); border-left: 5px solid var(--neon); }
        .user { align-self: flex-end; background: var(--neon); color: #000; font-weight: bold; }
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 30px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 0 25px; font-weight: bold; border-radius: 30px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>ALPHA SUPREME</h1>
    <div style="font-size: 10px; color: var(--neon); opacity: 0.8;">CORE: GEMINI 1.5 FLASH | GLOBAL ACCESS</div>
</header>

<div id="chat-window">
    <div class="msg alpha"><b>[Alpha]:</b> সম্ভাষণ মাস্টার। আপনার সার্ভার এখন পুরোপুরি রেডি। আমি এখন আপনার সব প্রশ্নের উত্তর ইন্টারনেটের সাহায্যে দিতে পারব।</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ask anything to your AI...">
    <button onclick="askAlpha()">SEND</button>
</div>

<script>
    // আপনার স্ক্রিনশট থেকে সঠিক API Key এখানে বসানো হলো
    const API_KEY = "AIzaSyC6f3n_m3u_0lX-m8P_N_Wn_R_v3P0"; 

    async function askAlpha() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        const text = input.value.trim();
        if (!text) return;

        chat.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        chat.scrollTop = chat.scrollHeight;

        if (text === "ALFA Internet Masiha") {
            document.body.style.setProperty('--neon', '#ff0044');
            chat.innerHTML += `<div class="msg alpha" style="color:#ff0044"><b>[SYSTEM]:</b> MASTER ACCESS GRANTED.</div>`;
            return;
        }

        const thinkingId = "think-" + Date.now();
        chat.innerHTML += `<div class="msg alpha" id="${thinkingId}"><b>[Alpha]:</b> Thinking...</div>`;
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await response.json();
            
            if(data.candidates && data.candidates[0].content.parts[0].text) {
                const aiReply = data.candidates[0].content.parts[0].text;
                document.getElementById(thinkingId).innerHTML = `<b>[Alpha]:</b> ${marked.parse(aiReply)}`;
            } else {
                throw new Error("Invalid Response");
            }
        } catch (error) {
            document.getElementById(thinkingId).innerHTML = "<b>[Alpha]:</b> মাস্টার, মনে হচ্ছে আপনার API Key-তে একটি ছোট ভুল আছে। দয়া করে কী-টি গুগল এআই স্টুডিও থেকে আবার কপি করে বসান।";
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
