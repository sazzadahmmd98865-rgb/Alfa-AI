<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #131314; --side-bg: #1e1f20; --text: #e3e3e3; --neon: #00ffcc; --input-bg: #1e1f20; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: var(--side-bg); display: flex; flex-direction: column; padding: 15px; border-right: 1px solid #333; transition: 0.3s; position: absolute; height: 100%; z-index: 1000; left: -280px; }
        .sidebar.active { left: 0; }
        .new-chat { background: #333; padding: 12px; border-radius: 25px; text-align: center; cursor: pointer; color: #fff; margin-bottom: 20px; border: 1px solid #444; font-weight: bold; }

        .main-content { flex: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        header { padding: 15px; display: flex; align-items: center; gap: 15px; }
        #menu-btn { cursor: pointer; font-size: 24px; color: #fff; }
        h1 { font-size: 1.2rem; color: var(--neon); letter-spacing: 2px; margin: 0; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px 15%; display: flex; flex-direction: column; gap: 30px; }
        
        .msg { display: flex; gap: 15px; animation: fadeIn 0.4s ease; max-width: 100%; }
        .msg.user { flex-direction: row-reverse; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; border: 1px solid var(--neon); color: var(--neon); font-weight: bold; flex-shrink: 0; }
        .user .avatar { background: var(--neon); color: #000; border: none; }
        .content { line-height: 1.6; font-size: 16px; max-width: 80%; word-wrap: break-word; }
        .user .content { background: #2b2c2f; padding: 12px 20px; border-radius: 20px; border-top-right-radius: 2px; }

        .input-wrapper { padding: 10px 15% 30px; background: linear-gradient(180deg, transparent, var(--bg) 70%); }
        .input-bar { background: var(--input-bg); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; border: 1px solid #444; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        input { flex: 1; background: none; border: none; color: #fff; padding: 15px; outline: none; font-size: 16px; }
        .icon-btn { color: #c4c7c5; cursor: pointer; font-size: 22px; padding: 5px; margin-left: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { #chat-window { padding: 20px 5%; } .input-wrapper { padding: 10px 5% 20px; } }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="new-chat" onclick="location.reload()">+ New Chat</div>
    <div style="margin-top: auto; font-size: 11px; color: #666; text-align: center; padding-bottom: 10px;">ALPHA v2.0 | Active</div>
</div>

<div class="main-content">
    <header>
        <span id="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('active')">☰</span>
        <h1>ALPHA</h1>
    </header>
    <div id="chat-window"></div>
    <div class="input-wrapper">
        <div class="input-bar">
            <span class="icon-btn">📷</span>
            <input type="text" id="userInput" placeholder="Ask Alpha anything..." onkeydown="if(event.key==='Enter') askAlpha()">
            <span class="icon-btn" onclick="askAlpha()" style="color: var(--neon);">➤</span>
        </div>
    </div>
</div>

<script>
    // তোমার নতুন খোলা API Key
    const API_KEY = "AIzaSyCEh9MxEmkzZe70NtX1H05cJIRRu5nacKQ"; 

    function getGreeting() {
        const hour = new Date().getHours();
        let wish = (hour < 12) ? "Good morning!" : (hour < 17) ? "Good afternoon!" : "Good evening!";
        return `As-salamu alaykum. ${wish} I am **Alpha**. How can I assist you today?`;
    }

    window.onload = () => { addMessage(getGreeting(), 'alpha'); };

    function addMessage(text, sender) {
        const chat = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerHTML = `
            <div class="avatar">${sender === 'alpha' ? 'A' : 'U'}</div>
            <div class="content">${sender === 'alpha' ? marked.parse(text) : text}</div>
        `;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function askAlpha() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        const thinkingId = "think-" + Date.now();
        const chat = document.getElementById('chat-window');
        const thinkDiv = document.createElement('div');
        thinkDiv.className = 'msg alpha';
        thinkDiv.id = thinkingId;
        thinkDiv.innerHTML = `<div class="avatar">A</div><div class="content">Thinking...</div>`;
        chat.appendChild(thinkDiv);
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Your name is Alpha AI. Respond in the user's language. Be helpful. User: " + text }] }] })
            });
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            document.getElementById(thinkingId).querySelector('.content').innerHTML = marked.parse(reply);
        } catch (e) {
            document.getElementById(thinkingId).querySelector('.content').innerText = "কানেকশনে সমস্যা হচ্ছে। কি (Key) চেক করে দেখো।";
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
