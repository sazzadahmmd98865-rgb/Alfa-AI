<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA SUPREME - Global AI Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #131314; --side-bg: #1e1f20; --text: #e3e3e3; --neon: #00ffcc; --highlight: #2b2c2f; }
        body { background: var(--bg); color: var(--text); font-family: 'Google Sans', Arial, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles (image_7.png অনুযায়ী) */
        .sidebar { width: 260px; background: var(--side-bg); padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #333; transition: 0.3s; z-index: 10; }
        .sidebar.collapsed { margin-left: -260px; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; color: #c4c7c5; text-decoration: none;}
        .nav-item:hover, .nav-item.active { background: var(--highlight); color: #fff; }
        .nav-icon { font-size: 1.2rem; }
        .sidebar-header { font-size: 1.2rem; font-weight: bold; color: var(--neon); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .login-btn { margin-top: auto; background: var(--neon); color: #000; text-align: center; padding: 12px; border-radius: 25px; font-weight: bold; text-decoration: none; cursor: pointer;}

        /* Main Chat Area */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px; display: flex; align-items: center; gap: 15px; background: rgba(19,19,20,0.9); backdrop-filter: blur(5px); border-bottom: 1px solid #333; }
        #menu-toggle { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }
        .msg { max-width: 80%; line-height: 1.7; font-size: 1rem; animation: fadeIn 0.3s ease; }
        .msg.alpha { align-self: flex-start; display: flex; gap: 15px; }
        .msg.alpha .avatar { width: 35px; height: 35px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--neon); font-weight: bold; border: 1px solid var(--neon);}
        .msg.alpha .content { background: var(--highlight); padding: 15px 20px; border-radius: 18px; border-top-left-radius: 2px; }
        .msg.user { align-self: flex-end; background: #2e2f33; padding: 15px 20px; border-radius: 18px; border-top-right-radius: 2px; }
        .msg-image { max-width: 200px; border-radius: 10px; margin-top: 10px; border: 1px solid #444; }

        /* Input Area (image_8.png অনুযায়ী) */
        .input-wrapper { padding: 20px; display: flex; justify-content: center; background: linear-gradient(180deg, rgba(19,19,20,0) 0%, rgba(19,19,20,1) 50%); }
        .input-bar { width: 100%; max-width: 800px; background: var(--side-bg); border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid #444; transition: 0.3s; }
        .input-bar:focus-within { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        .action-icon { background: none; border: none; color: #c4c7c5; font-size: 1.3rem; padding: 10px; cursor: pointer; border-radius: 50%; transition: 0.2s; }
        .action-icon:hover { background: rgba(255,255,255,0.05); color: #fff; }
        #userInput { flex: 1; background: none; border: none; color: #fff; padding: 15px; outline: none; font-size: 1rem; }
        #image-preview-container { display: none; padding: 10px; position: absolute; bottom: 90px; background: var(--side-bg); border-radius: 10px; border: 1px solid #444; }
        #image-preview { max-height: 100px; border-radius: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        code { background: #000; padding: 2px 5px; border-radius: 4px; color: var(--neon); font-family: monospace;}
        pre { background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; overflow-x: auto; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span>ALPHA</span>
        <button id="close-sidebar" style="background:none; border:none; color:#fff; cursor:pointer;">&times;</button>
    </div>
    <a href="#" class="nav-item active"><span class="nav-icon">➕</span> New chat</a>
    <a href="#" class="nav-item"><span class="nav-icon">🔍</span> Search chats</a>
    <a href="#" class="nav-item"><span class="nav-icon">🖼️</span> Images</a>
    <a href="#" class="nav-item"><span class="nav-icon">📱</span> Apps</a>
    <div style="border-top: 1px solid #333; margin: 10px 0;"></div>
    <a href="#" class="nav-item"><span class="nav-icon">🔬</span> Deep research</a>
    <a href="#" class="nav-item"><span class="nav-icon">💻</span> Codex</a>
    <a href="#" class="nav-item"><span class="nav-icon">📂</span> Projects</a>
    
    <a class="login-btn" onclick="alert('Login feature requires a backend database. This is a design demo.')">Sign In / Log In</a>
</div>

<div class="main-content">
    <header>
        <button id="menu-toggle">☰</button>
        <h1 style="margin:0; font-size: 1.2rem;">Alpha Supreme</h1>
    </header>

    <div id="chat-window">
        <div class="msg alpha">
            <div class="avatar">A</div>
            <div class="content">সম্ভাষণ মাস্টার। আমি আলফা, আপনার গ্লোবাল এআই প্ল্যাটফর্ম। আমি এখন টেক্সট, ছবি এবং ভয়েস কমান্ডের মাধ্যমে আপনার সেবা দিতে প্রস্তুত।</div>
        </div>
    </div>

    <div id="image-preview-container">
        <img id="image-preview" src="" alt="Preview">
        <button onclick="clearImage()" style="background:none; border:none; color:red; cursor:pointer; position:absolute; top:0; right:0;">&times;</button>
    </div>

    <div class="input-wrapper">
        <div class="input-bar">
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload()">
            <button class="action-icon" onclick="document.getElementById('imageInput').click()" title="ছবি আপলোড করুন">📷</button>
            
            <button class="action-icon" id="mic-btn" onclick="startDictation()" title="ভয়েস কমান্ড দিন">🎤</button>
            
            <input type="text" id="userInput" placeholder="আলফাকে যেকোনো কিছু জিজ্ঞাসা করুন...">
            
            <button class="action-icon" onclick="askAlpha()" style="color: var(--neon);" title="পাঠান">➤</button>
        </div>
    </div>
</div>

<script>
    // আপনার Gemini API Key (multimodal supported)
    const API_KEY = "AIzaSyA-6sjWJbzAS5yXNzcpaxdgm_b_MX46Zk4"; 
    let selectedImageData = null;

    // --- UI Logic (Menu & Sidebar) ---
    const sidebar = document.getElementById('sidebar');
    document.getElementById('menu-toggle').addEventListener('click', () => sidebar.classList.toggle('collapsed'));
    document.getElementById('close-sidebar').addEventListener('click', () => sidebar.classList.add('collapsed'));

    // --- Multimodal Logic (Image) ---
    function handleImageUpload() {
        const file = document.getElementById('imageInput').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => {
            selectedImageData = reader.result.split(',')[1];
            document.getElementById('image-preview').src = reader.result;
            document.getElementById('image-preview-container').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
    function clearImage() {
        selectedImageData = null;
        document.getElementById('image-preview-container').style.display = 'none';
        document.getElementById('imageInput').value = '';
    }

    // --- Multimodal Logic (Voice/Speech to Text) ---
    function startDictation() {
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'bn-BD'; // বাংলা ইনপুটের জন্য, ইংলিশের জন্য 'en-US' দিন

            const micBtn = document.getElementById('mic-btn');
            micBtn.style.color = 'red'; // রেকর্ডিং বোঝাতে

            recognition.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                micBtn.style.color = '#c4c7c7';
                askAlpha(); // কথা শেষ হলে অটো সেন্ড হবে
            };
            recognition.onerror = () => micBtn.style.color = '#c4c7c7';
            recognition.onend = () => micBtn.style.color = '#c4c7c7';
            recognition.start();
        } else { alert("আপনার ব্রাউজার ভয়েস ইনপুট সমর্থন করে না।"); }
    }

    // --- Core AI Logic (multimodal) ---
    async function askAlpha() {
        const input = document.getElementById('userInput');
        const chatWindow = document.getElementById('chat-window');
        const text = input.value.trim();
        
        if (!text && !selectedImageData) return;

        // User Message UI
        let userMsgHTML = `<div class="msg user"><div>${text}</div>`;
        if (selectedImageData) userMsgHTML += `<img src="data:image/jpeg;base64,${selectedImageData}" class="msg-image">`;
        userMsgHTML += `</div>`;
        chatWindow.innerHTML += userMsgHTML;
        
        input.value = '';
        clearImage();
        chatWindow.scrollTop = chatWindow.scrollHeight;

        // Thinking UI
        const thinkingId = "think-" + Date.now();
        chatWindow.innerHTML += `
            <div class="msg alpha" id="${thinkingId}">
                <div class="avatar">A</div>
                <div class="content">চিন্তা করছি...</div>
            </div>`;
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            // Multimodal prompt construction
            const contents = [{ parts: [{ text: "You are Alpha AI Supreme, a global expert assistant. Always reply in the same language the user uses. User message: " + text }] }];
            if (selectedImageData) {
                contents[0].parts.push({ inline_data: { mime_type: "image/jpeg", data: selectedImageData } });
            }

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents })
            });

            const data = await response.json();
            const aiReply = data.candidates[0].content.parts[0].text;
            
            // AI Reply UI (marked.js দিয়ে ফরম্যাট করা)
            document.getElementById(thinkingId).innerHTML = `
                <div class="avatar">A</div>
                <div class="content">${marked.parse(aiReply)}</div>`;
        } catch (error) {
            document.getElementById(thinkingId).innerHTML = `
                <div class="avatar">A</div>
                <div class="content" style="color:red;">দুঃখিত মাস্টার, সার্ভারের সাথে সংযোগ বিচ্ছিন্ন হয়েছে।</div>`;
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
                                     </html>
