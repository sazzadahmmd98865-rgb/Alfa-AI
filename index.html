<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha AI - The Global Intelligence</title>
    <style>
        :root { --main: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: var(--main); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; border-bottom: 2px solid var(--main); text-align: center; box-shadow: 0 0 20px var(--main); background: #000; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.6; font-size: 16px; border: 1px solid #333; }
        .alpha { align-self: flex-start; background: #001a1a; border-color: var(--main); box-shadow: 0 0 10px #004444; }
        .user { align-self: flex-end; background: #111; border-color: #555; color: #fff; }
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid var(--main); color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--main); color: #000; border: none; padding: 10px 25px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .master-mode { border-color: #ff0000 !important; color: #ff0000 !important; box-shadow: 0 0 20px #ff0000 !important; }
    </style>
</head>
<body>

<header>
    <h1 id="title">ALPHA AI SYSTEM</h1>
    <small id="status">ACCESS: PUBLIC</small>
</header>

<div id="chat-box" id="chatBox">
    <div class="msg alpha">স্বাগতম! আমি আলফা। আমি আপনাকে কীভাবে সাহায্য করতে পারি?</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="আপনার প্রশ্ন বা মাস্টার কোড দিন...">
    <button onclick="askAlpha()">SEND</button>
</div>

<script>
    let isMaster = false;

    function askAlpha() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-box');
        const text = input.value.trim();
        
        if(!text) return;

        chat.innerHTML += `<div class="msg user">${text}</div>`;

        if (text === "ALFA Internet Masiha") {
            isMaster = true;
            document.getElementById('title').innerText = "👑 ALPHA MASTER PANEL";
            document.getElementById('title').classList.add('master-mode');
            document.getElementById('status').innerText = "STATUS: ADMIN ACTIVATED";
            document.getElementById('status').style.color = "red";
            addReply("স্বাগতম মসীহা! আপনার বিশেষ ক্ষমতা এবং স্মার্ট ইন্টেলিজেন্স সক্রিয় করা হয়েছে। আদেশ করুন।");
        } else {
            setTimeout(() => {
                let reply = isMaster ? "জি মাস্টার, আমি আপনার জন্য তথ্য বিশ্লেষণ করছি..." : "আমি আপনার প্রশ্নটি নিয়ে কাজ করছি। একটু অপেক্ষা করুন।";
                addReply(reply);
            }, 800);
        }
        input.value = '';
        chat.scrollTop = chat.scrollHeight;
    }

    function addReply(txt) {
        const chat = document.getElementById('chat-box');
        chat.innerHTML += `<div class="msg alpha ${isMaster ? 'master-mode' : ''}"><b>[Alpha]:</b> ${txt}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
