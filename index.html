<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA - Global AI Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --neon: #00ffcc; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid #333; background: #000; text-align: center; }
        h1 { margin: 0; font-size: 1.5rem; color: var(--neon); letter-spacing: 5px; font-weight: bold; }
        #chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; line-height: 1.6; font-size: 16px; animation: fadeIn 0.3s ease; display: flex; gap: 12px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; border: 1px solid var(--neon); font-weight: bold; color: var(--neon); flex-shrink: 0; }
        .content { background: var(--card); padding: 12px 18px; border-radius: 18px; border-top-left-radius: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .user { align-self: flex-end; background: var(--neon); color: #000; font-weight: bold; border-radius: 18px; border-top-right-radius: 2px; padding: 12px 18px; }
        .input-area { padding: 20px; background: #000; display: flex; justify-content: center; border-top: 1px solid #222; }
        .input-bar { width: 100%; max-width: 800px; background: #111; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid #333; }
        input { flex: 1; background: none; border: none; color: #fff; padding: 12px; outline: none; font-size: 16px; }
        .btn { background: none; border: none; color: var(--neon); cursor: pointer; font-size: 1.3rem; padding: 5px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>ALPHA</h1>
</header>

<div id="chat-window"></div>

<div class="input-area">
    <div class="input-bar">
        <button class="btn" onclick="alert('Image feature is ready!')">📷</button>
        <input type="text" id="userInput" placeholder="Ask Alpha anything...">
        <button class="btn" onclick="askAlpha()">➤</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyA-6sjWJbzAS5yXNzcpaxdgm_b_MX46Zk4"; 

    // সময় অনুযায়ী শুভেচ্ছা ও সালাম
    function getGreeting() {
        const hour = new Date().getHours();
        let greeting = "";
        if (hour < 12) greeting = "Good morning! ";
        else if (hour < 17) greeting = "Good afternoon! ";
        else greeting = "Good evening! ";
        
        return "As-salamu alaykum. " + greeting + "I am Alpha. How can I help you today?";
    }

    // পেজ লোড হলে প্রথম বার্তা
    window.onload = () => {
        const chat = document.getElementById('chat-window');
        chat.innerHTML += `
            <div class="msg">
                <div class="avatar">A</div>
                <div class="content">${getGreeting()}</div>
            </div>`;
    };

    async function askAlpha() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        const text = input.value.trim();
        if (!text) return;

        chat.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        chat.scrollTop = chat.scrollHeight;

        const thinkingId = "think-" + Date.now();
        chat.innerHTML += `
            <div class="msg" id="${thinkingId}">
                <div class="avatar">A</div>
                <div class="content">Thinking...</div>
            </div>`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: "You are Alpha, a professional and helpful AI. Reply in the same language the user uses. User message: " + text }] }] 
                })
            });
            const data = await response.json();
            const aiReply = data.candidates[0].content.parts[0].text;
            document.getElementById(thinkingId).innerHTML = `
                <div class="avatar">A</div>
                <div class="content">${marked.parse(aiReply)}</div>`;
        } catch (error) {
            document.getElementById(thinkingId).innerHTML = `<div class="avatar">A</div><div class="content">Connection lost. Please check your API key.</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
    </html>
